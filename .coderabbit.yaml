# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

language: en

reviews:
  # Review profile — aggressively flag issues
  profile: "assertive"

  # Exclude paths that don't need review
  path_filters:
    - "!dist/**"
    - "!app/web/dist/**"
    - "!app/figma-plugin/dist/**"
    - "!pnpm-lock.yaml"
    - "!logs/**"
    - "!data/**"
    - "!fixtures/**"
    - "!reports/**"
    - "!**/*.png"
    - "!**/*.jpg"

  # Disable label suggestions in walkthrough
  suggested_labels: false
  auto_apply_labels: false

  # Auto-review on PR creation
  auto_review:
    enabled: true
    # Skip draft PRs
    drafts: false
    labels: []

  # Static analysis tools
  tools:
    biome:
      enabled: true

  # Per-path review instructions
  path_instructions:
    - path: "src/**/*.ts"
      instructions: |
        This project uses TypeScript strict mode with noUncheckedIndexedAccess and exactOptionalPropertyTypes enabled.
        - Check for unchecked array/object index access (must guard against undefined)
        - Do not assign explicit undefined to optional properties
        - Use Zod schemas for external input validation (schemas in contracts/ directory)
        - Use ESM imports with .js extension for relative imports
        - Use relative paths for imports (not @/* alias)

    - path: "src/core/rules/**"
      instructions: |
        Rule files define analysis rules. Rule logic and score config are separated:
        - Rule logic lives here in rule files
        - Score/severity/threshold config lives in rules/rule-config.ts
        - Do not hardcode scores in rule logic files
        - Pay close attention to rule scoring logic and severity classification
        - Flag any score values that seem arbitrary or inconsistent with the stated calibration approach

    - path: "src/core/engine/scoring.ts"
      instructions: "Verify density/diversity weighting logic is mathematically sound."

    - path: "src/core/contracts/**"
      instructions: |
        Zod schema definitions. All external input validation happens here.
        - Types should be inferred from schemas: z.infer<typeof Schema>
        - Do not define duplicate TypeScript interfaces when a Zod schema exists

    - path: "src/agents/**"
      instructions: |
        Internal calibration pipeline agents. Not user-facing.
        - These run only inside Claude Code via subagents
        - Check for proper error handling in pipeline steps

    - path: "**/*.test.ts"
      instructions: |
        Test files are co-located with source files.
        - Use vitest globals (describe/it/expect) - no imports needed
        - Verify edge cases for noUncheckedIndexedAccess (undefined checks)

    - path: "app/**"
      instructions: |
        Browser runtime code. Shared UI components are in app/shared/.
        - app/web/ is the GitHub Pages web app
        - app/figma-plugin/ is the Figma plugin
        - Both inline shared UI from app/shared/ at build time

    - path: "**/*.{ts,js}"
      instructions: |
        If the code change introduces behavior that contradicts existing documentation (README.md, CLAUDE.md, JSDoc comments),
        flag it and suggest updating the relevant documentation to stay in sync.

    - path: ".github/workflows/**"
      instructions: |
        CI workflows. This project uses pnpm as package manager and Node.js 24.
        Ensure workflows use pnpm/action-setup@v4 and --frozen-lockfile.

  pre_merge_checks:
    docstrings:
      mode: "off"

chat:
  auto_reply: true
