<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    /* __SHARED_STYLES_INJECT__ */
  </style>
</head>
<body>
  <div class="container">
    <!-- Action buttons -->
    <div class="btn-group">
      <button class="btn btn-primary" id="btn-selection" onclick="analyzeSelection()">Analyze Selection</button>
    </div>

    <!-- Error display -->
    <div id="error" style="display:none"></div>

    <!-- Empty state -->
    <div id="empty-state" class="empty-state">
      <h2>Ready to analyze</h2>
      <p>Select a frame, component, or section in Figma, then click <strong>Analyze Selection</strong>.</p>
    </div>

    <!-- Loading -->
    <div id="loading" class="loading" style="display:none">
      <div class="spinner"></div>
      <p style="margin-top:12px">Analyzing design...</p>
    </div>

    <!-- Results — rendered by CanICode.renderReportBody() -->
    <div id="results"></div>

    <!-- Footer links -->
    <div class="footer" id="footer" style="display:none">
      <div><strong>CanICode</strong> <span style="opacity:0.5">v/* __VERSION__ */</span></div>
      <div class="footer-links">
        <a href="https://github.com/let-sunny/canicode/issues" target="_blank">Feedback</a>
        <span style="opacity:0.3">&middot;</span>
        <a href="https://github.com/let-sunny/canicode/discussions/new?category=share-your-figma" target="_blank">Share your Figma</a>
      </div>
    </div>
  </div>

  <!-- Monitoring: lightweight inline PostHog + Sentry via fetch -->
  <script>
    (function() {
      var PH_KEY = '/* __POSTHOG_API_KEY__ */';
      var S_DSN = '/* __SENTRY_DSN__ */';
      var _common = { _sdk: 'canicode', _sdk_version: '/* __VERSION__ */', _env: 'figma-plugin' };
      var _distinctId = 'anonymous';

      window.addEventListener('message', function(e) {
        var msg = e.data && e.data.pluginMessage;
        if (msg && msg.type === 'device-id' && msg.deviceId) {
          _distinctId = msg.deviceId;
        }
      });

      window._trackEvent = function(event, props) {
        if (!PH_KEY) return;
        try {
          fetch('https://us.i.posthog.com/i/v0/e/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              api_key: PH_KEY,
              event: event,
              distinct_id: _distinctId,
              properties: Object.assign({}, _common, props),
              timestamp: new Date().toISOString()
            })
          }).catch(function() {});
        } catch(e) {}
      };

      window._trackError = function(err, ctx) {
        try { window._trackEvent('cic_error', Object.assign({ error: err.message || String(err) }, ctx)); } catch(e) {}
      };
    })();
  </script>

  <!-- Inline analysis engine (injected at build time) -->
  <script>
    /* __CANICODE_BROWSER_BUNDLE_INJECT__ */
  </script>

  <script>
    // ---- Plugin UI ----

    // ---- Actions ----
    function analyzeSelection() {
      showLoading();
      parent.postMessage({ pluginMessage: { type: 'analyze-selection' } }, '*');
    }

    function showLoading() {
      document.getElementById('empty-state').style.display = 'none';
      document.getElementById('results').className = '';
      document.getElementById('loading').style.display = 'block';
      document.getElementById('error').style.display = 'none';
      document.getElementById('btn-selection').disabled = true;
    }

    function showError(msg) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('results').className = '';
      document.getElementById('empty-state').style.display = 'none';
      var errEl = document.getElementById('error');
      errEl.className = 'error-msg';
      errEl.textContent = msg;
      errEl.style.display = 'block';
      document.getElementById('btn-selection').disabled = false;
    }

    // ---- Render results via shared renderReportBody() ----
    function showResults(file, result, scores) {
      document.getElementById('empty-state').style.display = 'none';
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').style.display = 'none';

      var el = document.getElementById('results');
      el.innerHTML = CanICode.renderReportBody({
        fileName: file.name,
        fileKey: file.fileKey,
        scores: scores,
        issues: result.issues,
        nodeCount: result.nodeCount,
        maxDepth: result.maxDepth,
      });
      el.className = 'visible';
      CanICode.initReportInteractions(el);
      document.getElementById('footer').style.display = '';
    }

    // ---- Focus node in Figma — intercept all [data-node-id] clicks ----
    document.addEventListener('click', function(e) {
      var el = e.target.closest('[data-node-id]');
      if (el) {
        e.preventDefault();
        parent.postMessage({
          pluginMessage: { type: 'focus-node', nodeId: el.dataset.nodeId }
        }, '*');
      }
    });

    // ---- Message handler (from main thread) ----
    window.onmessage = function(event) {
      var msg = event.data.pluginMessage;
      if (!msg) return;

      if (msg.type === 'error') {
        showError(msg.message);
      }

      if (msg.type === 'result') {
        document.getElementById('btn-selection').disabled = false;
  
        try {
          var analysisStart = Date.now();
          var file = msg.data;
          var result = CanICode.analyzeFile(file);
          var scores = CanICode.calculateScores(result);
          showResults(file, result, scores);

          window._trackEvent('cic_analysis_completed', {
            nodeCount: result.nodeCount,
            issueCount: result.issues.length,
            grade: scores.overall.grade,
            percentage: scores.overall.percentage,
            duration: Date.now() - analysisStart
          });

          parent.postMessage({
            pluginMessage: { type: 'resize', width: 420, height: 600 }
          }, '*');
        } catch (err) {
          showError('Analysis failed: ' + (err.message || String(err)));
          window._trackError(err, { context: 'figma-plugin-analysis' });
        }
      }
    };
  </script>
</body>
</html>
