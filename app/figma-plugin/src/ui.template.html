<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    /* __SHARED_STYLES_INJECT__ */
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <span class="header-logo">CanICode</span>
      <span class="header-sub">Design Readiness Checker</span>
    </div>

    <!-- Action buttons -->
    <div class="btn-group">
      <button class="btn btn-primary" id="btn-selection" onclick="analyzeSelection()">Analyze Selection</button>
      <button class="btn" id="btn-page" onclick="analyzePage()">Analyze Page</button>
    </div>

    <!-- Error display -->
    <div id="error" style="display:none"></div>

    <!-- Empty state -->
    <div id="empty-state" class="empty-state">
      <h2>Ready to analyze</h2>
      <p>Select a frame, component, or section in Figma, then click <strong>Analyze Selection</strong>.<br>
      Or click <strong>Analyze Page</strong> to check the entire current page.</p>
    </div>

    <!-- Loading -->
    <div id="loading" class="loading" style="display:none">
      <div class="spinner"></div>
      <p style="margin-top:12px">Analyzing design...</p>
    </div>

    <!-- Results -->
    <div id="results">
      <!-- Grade -->
      <div class="grade-section" id="grade-section"></div>

      <!-- Category grid -->
      <div class="cat-grid" id="cat-grid"></div>

      <!-- Summary bar -->
      <div class="summary-bar" id="summary-bar"></div>

      <!-- Filter tabs -->
      <div class="filter-tabs" id="filter-tabs"></div>

      <!-- Issue list -->
      <div id="issue-list"></div>

      <!-- Footer -->
      <div class="footer">
        <div>Generated by <strong>CanICode</strong> <span style="opacity:0.5">v/* __VERSION__ */</span></div>
        <div class="footer-links">
          <a href="https://github.com/let-sunny/canicode/issues" target="_blank">Feedback</a>
          <span style="opacity:0.3">&middot;</span>
          <a href="https://github.com/let-sunny/canicode/discussions/new?category=share-your-figma" target="_blank">Share your Figma</a>
        </div>
      </div>
    </div>
  </div>

  <!-- Monitoring: lightweight inline PostHog + Sentry via fetch -->
  <script>
    (function() {
      var PH_KEY = '/* __POSTHOG_API_KEY__ */';
      var S_DSN = '/* __SENTRY_DSN__ */';
      var _common = { _sdk: 'canicode', _sdk_version: '/* __VERSION__ */', _env: 'figma-plugin' };
      var _distinctId = 'anonymous';

      // Receive device ID from main thread (hashed Figma user ID)
      window.addEventListener('message', function(e) {
        var msg = e.data && e.data.pluginMessage;
        if (msg && msg.type === 'device-id' && msg.deviceId) {
          _distinctId = msg.deviceId;
        }
      });

      window._trackEvent = function(event, props) {
        if (!PH_KEY) return;
        try {
          fetch('https://us.i.posthog.com/i/v0/e/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              api_key: PH_KEY,
              event: event,
              distinct_id: _distinctId,
              properties: Object.assign({}, _common, props),
              timestamp: new Date().toISOString()
            })
          }).catch(function() {});
        } catch(e) {}
      };

      window._trackError = function(err, ctx) {
        try { window._trackEvent('cic_error', Object.assign({ error: err.message || String(err) }, ctx)); } catch(e) {}
      };
    })();
  </script>

  <!-- Inline analysis engine (injected at build time) -->
  <script>
    /* __CANICODE_BROWSER_BUNDLE_INJECT__ */
  </script>

  <!-- Shared UI code (inlined at build time) -->
  <script>
    /* __SHARED_CONSTANTS_INJECT__ */
  </script>
  <script>
    /* __SHARED_UTILS_INJECT__ */
  </script>
  <script>
    /* __SHARED_GAUGE_INJECT__ */
  </script>

  <script>
    // ---- Plugin-specific UI code ----

    // ---- State ----
    var currentScores = null;
    var currentResult = null;
    var activeCategory = 'all';

    // Alias for backward compat
    var esc = escapeHtml;

    // ---- Render ----
    function showResults(scores, result) {
      currentScores = scores;
      currentResult = result;

      document.getElementById('empty-state').style.display = 'none';
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').style.display = 'none';

      var resultsEl = document.getElementById('results');
      resultsEl.className = 'visible';

      // Grade
      var gradeEl = document.getElementById('grade-section');
      gradeEl.innerHTML =
        renderGaugeSvg(scores.overall.percentage, 140, 9, scores.overall.grade) +
        '<div class="grade-score">' + scores.overall.percentage + ' <span>/ 100</span></div>' +
        '<div class="grade-label">Overall Score &middot; ' + result.nodeCount + ' nodes</div>';

      // Category list
      var categories = CanICode.CATEGORIES || CATEGORIES;
      var catTips = { structure: 'Can AI read the layout? (Auto Layout, nesting, positioning)', token: 'Can AI reproduce exact values? (colors, fonts, shadows, spacing)', component: 'Is the design efficient for AI context? (reuse, variants)', naming: 'Can AI infer meaning? (semantic names, conventions)', behavior: 'Can AI know what happens? (overflow, truncation, interactions)' };
      var gridEl = document.getElementById('cat-grid');
      gridEl.innerHTML = categories.map(function(cat) {
        var cs = scores.byCategory[cat];
        var barColor = cs.percentage >= 80 ? 'var(--green)' : cs.percentage >= 60 ? 'var(--amber)' : 'var(--red)';
        return '<div class="cat-row">' +
          '<div class="cat-score ' + scoreClass(cs.percentage) + '">' + cs.percentage + '</div>' +
          '<div class="cat-label" data-tip="' + esc(catTips[cat] || '') + '">' + (CATEGORY_LABELS[cat] || cat) + '</div>' +
          '<div class="cat-bar"><div class="cat-bar-fill" style="width:' + cs.percentage + '%;background:' + barColor + '"></div></div>' +
          '<div class="cat-issues">' + cs.issueCount + '</div>' +
        '</div>';
      }).join('');

      // Summary bar
      var s = scores.summary;
      var sevTips = { blocking: 'Cannot implement correctly without fixing. Direct impact on screen reproduction.', risk: 'Implementable now but will break or increase cost later.', missing: 'Information is absent, forcing AI to guess.', suggestion: 'Not immediately problematic, but improves systemization.' };
      document.getElementById('summary-bar').innerHTML =
        '<div class="summary-item" data-tip="' + esc(sevTips.blocking) + '"><span class="dot dot-blocking"></span><span class="summary-count">' + s.blocking + '</span> Blocking</div>' +
        '<div class="summary-item" data-tip="' + esc(sevTips.risk) + '"><span class="dot dot-risk"></span><span class="summary-count">' + s.risk + '</span> Risk</div>' +
        '<div class="summary-item" data-tip="' + esc(sevTips.missing) + '"><span class="dot dot-missing"></span><span class="summary-count">' + s.missingInfo + '</span> Missing</div>' +
        '<div class="summary-item" data-tip="' + esc(sevTips.suggestion) + '"><span class="dot dot-suggestion"></span><span class="summary-count">' + s.suggestion + '</span> Suggestion</div>' +
        '<div class="summary-total">' + s.totalIssues + ' total</div>';

      // Filter tabs
      document.getElementById('filter-tabs').innerHTML =
        '<span class="filter-tab active" data-cat="all" onclick="filterCategory(\'all\')">All</span>' +
        categories.map(function(cat) {
          var cs = scores.byCategory[cat];
          if (cs.issueCount === 0) return '';
          return '<span class="filter-tab" data-cat="' + cat + '" onclick="filterCategory(\'' + cat + '\')">' + (CATEGORY_LABELS[cat] || cat) + ' (' + cs.issueCount + ')</span>';
        }).join('');

      // Issues
      renderIssues(result.issues, 'all');
    }

    function renderIssues(issues, categoryFilter) {
      var filtered = categoryFilter === 'all'
        ? issues
        : issues.filter(function(i) { return i.rule.definition.category === categoryFilter; });

      // Group by severity
      var bySev = {};
      for (var si = 0; si < SEVERITY_ORDER.length; si++) bySev[SEVERITY_ORDER[si]] = [];
      for (var ii = 0; ii < filtered.length; ii++) {
        var sev = filtered[ii].config.severity;
        if (bySev[sev]) bySev[sev].push(filtered[ii]);
      }

      var listEl = document.getElementById('issue-list');
      var html = '';

      for (var sj = 0; sj < SEVERITY_ORDER.length; sj++) {
        var sevKey = SEVERITY_ORDER[sj];
        var sevIssues = bySev[sevKey];
        if (!sevIssues || sevIssues.length === 0) continue;

        var collapsed = sevKey === 'suggestion' ? ' collapsed' : '';
        html += '<div class="issue-section' + collapsed + '">' +
          '<div class="issue-section-header" onclick="toggleSection(this)">' +
            '<svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 9l-7 7-7-7"/></svg>' +
            '<span class="dot ' + severityDotClass(sevKey) + '"></span>' +
            (SEVERITY_LABELS[sevKey] || sevKey) +
            '<span class="count">' + sevIssues.length + '</span>' +
          '</div>' +
          '<div class="issue-list">' +
            sevIssues.map(function(issue) { return renderIssueRow(issue); }).join('') +
          '</div>' +
        '</div>';
      }

      if (filtered.length === 0) {
        html = '<div style="text-align:center;padding:24px;color:var(--fg-muted);font-size:12px;">No issues found</div>';
      }

      listEl.innerHTML = html;
    }

    function renderIssueRow(issue) {
      var def = issue.rule.definition;
      var sev = issue.config.severity;
      return '<div class="issue-row">' +
        '<div class="issue-summary" onclick="toggleIssue(this)">' +
          '<span class="issue-dot ' + severityDotClass(sev) + '"></span>' +
          '<span class="issue-rule">' + esc(def.name) + '</span>' +
          '<span class="issue-msg">' + esc(issue.violation.message) + '</span>' +
          '<span class="issue-score ' + severityScoreClass(sev) + '">' + issue.calculatedScore + '</span>' +
        '</div>' +
        '<div class="issue-detail">' +
          '<div class="issue-path">' + esc(issue.violation.nodePath) + '</div>' +
          '<div class="issue-info">' +
            '<p><strong>Why:</strong> ' + esc(def.why) + '</p>' +
            '<p><strong>Impact:</strong> ' + esc(def.impact) + '</p>' +
            '<p><strong>Fix:</strong> ' + esc(def.fix) + '</p>' +
          '</div>' +
          '<button class="btn-focus" onclick="focusNode(\'' + esc(issue.violation.nodeId) + '\')">Focus in Figma <span>\u2192</span></button>' +
        '</div>' +
      '</div>';
    }

    // ---- Focus node in Figma ----
    function focusNode(nodeId) {
      parent.postMessage({ pluginMessage: { type: 'focus-node', nodeId: nodeId } }, '*');
    }

    // ---- Interactions ----
    function filterCategory(cat) {
      activeCategory = cat;
      // Update tab highlights
      document.querySelectorAll('.filter-tab').forEach(function(tab) {
        tab.classList.toggle('active', tab.dataset.cat === cat);
      });
      if (currentResult) {
        renderIssues(currentResult.issues, cat);
      }
    }

    // ---- Actions ----
    function analyzeSelection() {
      showLoading();
      parent.postMessage({ pluginMessage: { type: 'analyze-selection' } }, '*');
    }

    function analyzePage() {
      showLoading();
      parent.postMessage({ pluginMessage: { type: 'analyze-page' } }, '*');
    }

    function showLoading() {
      document.getElementById('empty-state').style.display = 'none';
      document.getElementById('results').className = '';
      document.getElementById('loading').style.display = 'block';
      document.getElementById('error').style.display = 'none';
      document.getElementById('btn-selection').disabled = true;
      document.getElementById('btn-page').disabled = true;
    }

    function showError(msg) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('results').className = '';
      document.getElementById('empty-state').style.display = 'none';
      var errEl = document.getElementById('error');
      errEl.className = 'error-msg';
      errEl.textContent = msg;
      errEl.style.display = 'block';
      document.getElementById('btn-selection').disabled = false;
      document.getElementById('btn-page').disabled = false;
    }

    // ---- Message handler (from main thread) ----
    window.onmessage = function(event) {
      var msg = event.data.pluginMessage;
      if (!msg) return;

      if (msg.type === 'ready') {
        // Plugin loaded
      }

      if (msg.type === 'error') {
        showError(msg.message);
      }

      if (msg.type === 'result') {
        document.getElementById('btn-selection').disabled = false;
        document.getElementById('btn-page').disabled = false;

        try {
          var analysisStart = Date.now();
          var file = msg.data;
          var result = CanICode.analyzeFile(file);
          var scores = CanICode.calculateScores(result);
          showResults(scores, result);

          window._trackEvent('cic_analysis_completed', {
            nodeCount: result.nodeCount,
            issueCount: result.issues.length,
            grade: scores.overall.grade,
            percentage: scores.overall.percentage,
            duration: Date.now() - analysisStart
          });

          // Resize plugin to fit content
          parent.postMessage({
            pluginMessage: { type: 'resize', width: 420, height: 600 }
          }, '*');
        } catch (err) {
          showError('Analysis failed: ' + (err.message || String(err)));
          window._trackError(err, { context: 'figma-plugin-analysis' });
        }
      }
    };

    // ---- Tooltip (JS-based, works inside Figma iframe) ----
    (function() {
      var tip = document.createElement('div');
      tip.className = 'cic-tooltip';
      var arrow = document.createElement('div');
      arrow.className = 'cic-tooltip-arrow';
      document.body.appendChild(tip);
      document.body.appendChild(arrow);

      function hide() { tip.classList.remove('visible'); arrow.classList.remove('visible'); }

      document.addEventListener('mouseover', function(e) {
        var el = e.target.closest('[data-tip]');
        if (!el) { hide(); return; }
        tip.textContent = el.getAttribute('data-tip');
        tip.classList.add('visible');
        var rect = el.getBoundingClientRect();
        var tipH = tip.offsetHeight;
        var tipW = tip.offsetWidth;
        var cx = rect.left + rect.width / 2;
        var tipLeft = Math.max(4, Math.min(cx - tipW / 2, window.innerWidth - tipW - 4));
        var above = rect.top - tipH - 10 >= 0;
        var tipTop = above ? rect.top - tipH - 10 : rect.bottom + 10;
        tip.style.left = tipLeft + 'px';
        tip.style.top = tipTop + 'px';
        arrow.style.left = (cx - 4) + 'px';
        arrow.style.top = (above ? rect.top - 14 : rect.bottom + 6) + 'px';
        arrow.classList.add('visible');
      });
      document.addEventListener('mouseleave', hide);
      document.addEventListener('mouseout', function(e) {
        if (!e.target.closest('[data-tip]')) hide();
      });
    })();
  </script>
</body>
</html>
